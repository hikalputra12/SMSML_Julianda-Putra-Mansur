name: Workflow CI (MLflow Project & Docker Build)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  run-ci:
    runs-on: ubuntu-latest

    env:
      HAS_DOCKER_SECRETS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns

    steps:
    # 1. Checkout repository code
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Set up Python Environment
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn matplotlib seaborn mlflow scikit-optimize dagshub

    # 4. Run MLflow Project (Re-training)
    - name: Run MLflow Project Training
      run: |
        # Menjalankan MLflow Project menggunakan mode env-manager local karena dependencies sudah diinstall di runner
        mlflow run MLProject/ --entry-point main --env-manager local -P n_estimators=100 -P max_depth=10

    # 5. Upload MLflow Artifacts (Skilled Level: Menyimpan artefak model & metrik ke GitHub)
    - name: Upload MLflow Training Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-training-results
        path: |
          mlruns/
          confusion_matrix.png
          feature_importance.png
        if-no-files-found: ignore

    # 6. Build Docker Image (Advance Level: Membangun image menggunakan mlflow build-docker)
    - name: Build Docker Image
      run: |
        # MLFLOW_TRACKING_URI diatur secara terpusat ke file://${{ github.workspace }}/mlruns
        # Semua proses pelatihan dan Docker build menggunakan tracking URI yang sama secara langsung.

        # Menulis skrip ke file terpisah agar aman dari konflik parsing karakter YAML
        cat << 'EOF' > get_model_path.py
        import mlflow
        import glob
        try:
            client = mlflow.tracking.MlflowClient()
            exp = client.get_experiment_by_name('Loan_Approval_CI')
            exp_id = exp.experiment_id if exp is not None else '0'
            runs = client.search_runs(experiment_ids=[exp_id])
            model_uri = None
            for run in runs:
                run_id = run.info.run_id
                try:
                    artifacts = client.list_artifacts(run_id)
                    if any(a.path == 'ci_model' for a in artifacts):
                        model_uri = f"runs:/{run_id}/ci_model"
                        break
                except Exception:
                    pass
            if model_uri:
                print(model_uri)
            else:
                paths = glob.glob('mlruns/*/*/artifacts/ci_model')
                print(paths[0] if len(paths) > 0 else 'MLProject/')
        except Exception:
            paths = glob.glob('mlruns/*/*/artifacts/ci_model')
            print(paths[0] if len(paths) > 0 else 'MLProject/')
        EOF

        # Eksekusi skrip dinamis
        MODEL_PATH=$(python get_model_path.py)
        echo "LOGGED_MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV
        echo "[INFO] Model URI yang ditemukan: $MODEL_PATH"

        # Tentukan nama image berdasarkan ketersediaan secrets
        IMAGE_NAME="haikal1012/loan-model:latest"
        if [ "${{ env.HAS_DOCKER_SECRETS }}" = "true" ]; then
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/loan-model:latest"
        fi
        echo "TARGET_IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

        # Eksekusi perintah asli mlflow models build-docker
        echo "[INFO] Memulai proses kompilasi Docker Image via MLflow Models..."
        mlflow models build-docker -m "$MODEL_PATH" -n "$IMAGE_NAME" --env-manager local

    # 7. Push Docker Image to Docker Hub (Advance Level: Hanya dijalankan jika secrets tersedia)
    - name: Log in to Docker Hub
      if: env.HAS_DOCKER_SECRETS == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image to Docker Hub
      if: env.HAS_DOCKER_SECRETS == 'true'
      run: |
        # Menggunakan env variable yang sudah disimpan di step 6 secara konsisten
        echo "Pushing Docker Image: ${{ env.TARGET_IMAGE_NAME }}"
        docker push "${{ env.TARGET_IMAGE_NAME }}"